<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bank Studio</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">&Sigma;</div>
      <div>
        <div class="brand-title">Bank Studio</div>
        <div class="brand-sub" id="exam-name">&mdash;</div>
      </div>
    </div>
    <nav class="tabs" role="tablist" aria-label="Views">
      <button class="tab" role="tab" data-tab="desk" aria-selected="true">Library Desk</button>
      <button class="tab" role="tab" data-tab="composer" aria-selected="false">Composer</button>
      <button class="tab" role="tab" data-tab="wall" aria-selected="false">Card Wall</button>
    </nav>
    <span id="render-badge" class="render-badge off">rendering&hellip;</span>
    <div class="spacer"></div>
    <div class="insert-toggle" title="How each added problem is written into the exam source">
      <span>Insert&nbsp;as</span>
      <div class="seg" role="group" aria-label="Insert mode">
        <button data-mode="id" aria-pressed="true">{id}</button>
        <button data-mode="filter" aria-pressed="false">{topic=&hellip;}</button>
      </div>
    </div>
    <button class="icon-btn" id="theme-btn" title="Toggle light / dark" aria-label="Toggle theme">&#9680;</button>
  </header>

  <main class="stage">
    <!-- ========== LIBRARY DESK ========== -->
    <section id="view-desk" class="view desk active" role="tabpanel">
      <section class="rail">
        <div class="rail-head">
          <input class="search" id="search" type="search" placeholder="Search stems, ids, topics&hellip;" aria-label="Search problems">
          <div class="filters" id="filters"></div>
        </div>
        <div class="count" id="count"></div>
        <div class="rowlist" id="rows"></div>
      </section>
      <section class="preview" id="preview"><div class="empty">Loading bank&hellip;</div></section>
      <section class="tray">
        <div class="tray-head"><h2>Exam in progress</h2><span class="n" id="tray-n"></span></div>
        <div class="examlist" id="examlist"></div>
        <div class="tray-foot">
          <div id="coverage" class="coverage"></div>
          <div class="tray-total"><span>Problems &middot; points</span><b id="tray-total">0 &middot; 0</b></div>
          <button class="btn primary" style="width:100%" id="copy-btn"><span>&#9106;</span> Copy exam body</button>
        </div>
      </section>
    </section>

    <!-- ========== COMPOSER ========== -->
    <section id="view-composer" class="view composer" role="tabpanel">
      <div class="comp-bar">
        <button class="btn primary sm" id="palette-open"><span>&#8984;K</span> Insert problem</button>
        <span class="comp-hint">Click a gap to move the <b>caret</b>, then insert. <kbd>&#8984;K</kbd>/<kbd>Ctrl&nbsp;K</kbd> anytime.</span>
        <div class="seg" style="margin-left:auto" role="group" aria-label="View mode">
          <button data-comp-view="rendered" aria-pressed="true">Rendered</button>
          <button data-comp-view="source" aria-pressed="false">Source</button>
        </div>
        <button class="btn sm" id="comp-copy"><span>&#9106;</span> Copy document</button>
      </div>
      <div class="comp-body" id="comp-body"></div>
    </section>

    <!-- ========== CARD WALL ========== -->
    <section id="view-wall" class="view wall" role="tabpanel">
      <div class="wall-top">
        <input class="search" id="wall-search" type="search" placeholder="Search the wall&hellip;" aria-label="Search problems">
        <div class="filters" id="wall-filters"></div>
        <span class="wall-tag" id="wall-tag"></span>
      </div>
      <div class="wall-scroll"><div class="grid" id="wall-grid"></div></div>
      <div class="dock">
        <div class="dock-title">Filmstrip<small id="dock-count">empty</small></div>
        <div class="film" id="wall-film"></div>
        <button class="btn primary sm" id="wall-copy"><span>&#9106;</span> Copy exam body</button>
      </div>
    </section>
  </main>

  <!-- overlays -->
  <div class="overlay" id="palette-overlay">
    <div class="palette" role="dialog" aria-label="Insert problem from bank">
      <div class="pal-input"><span class="ico">&#9906;</span>
        <input id="pal-input" type="text" placeholder="Search the bank &mdash; topic, id, or stem&hellip;" autocomplete="off">
        <span class="k">esc</span></div>
      <div class="pal-results" id="pal-results"></div>
      <div class="pal-foot"><span><kbd>&#8593;</kbd><kbd>&#8595;</kbd> navigate</span><span><kbd>&#8629;</kbd> insert at caret</span><span><kbd>esc</kbd> close</span></div>
    </div>
  </div>
  <div class="overlay" id="modal-overlay"><div class="modal" id="modal-inner" role="dialog" aria-label="Problem detail"></div></div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
