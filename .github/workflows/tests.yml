name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Fast: the builder's decision logic + multi-pass orchestration, simulated.
  # No TeX toolchain needed, so this runs in seconds on every push.
  builder-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pypdf (PDF split/vmap-slicing tests)
        run: python -m pip install --quiet pypdf
      - name: Builder logic + orchestration tests
        run: python Sublime/test_texlib_builder.py

  # Real end-to-end: drives the actual builder coroutines against a genuine
  # toolchain. Three proofs run here:
  #   * test_biber_integration.py    -- pdflatex + biber on a biblatex fixture,
  #     proving the biber-skip cache and rerun handling.
  #   * test_shuffle_integration.py -- drives a real lualatex build of a
  #     3-version exam and reads the PDF back to assert the autoexam shuffle
  #     GUARANTEES at the rendered-PDF level (same set per version, points
  #     travel, extra credit last, sections unmixed, student order == solutions
  #     order). Needs poppler's pdftotext (-bbox) + pdftoppm.
  #   * test_synctex_integration.py -- drives a real lualatex build then asks
  #     TeX Live's own `synctex edit` CLI to resolve a PDF-space point back to
  #     a source file + line, exactly what SumatraPDF does before an inverse
  #     search jump. Needs poppler's pdftotext (-bbox support -- NOT any
  #     xpdf-flavored build) in addition to the toolchain the other two use.
  # All soft-skip if their tools are missing, so a toolchain hiccup
  # degrades gracefully rather than failing the job.
  #
  # Runs in the SAME pinned full-scheme TeX Live container as smoke.yml /
  # visual.yml (full bundles biber + lualatex + the class deps: tikz/pgfplots,
  # lmodern, mathtools), so the whole CI shares one stable toolchain. pypdf
  # (the real check's PDF assertions) is pip-installed in the container.
  biber-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Real biber + SyncTeX tests in pinned TeX Live
        uses: xu-cheng/texlive-action@f886de8159e5952a131848a5fa9c3196a2132b5d
        with:
          scheme: full
          run: |
            set -e
            apk add --no-cache python3 py3-pip poppler-utils
            pip install --break-system-packages --quiet pypdf \
              || pip install --quiet pypdf
            python3 Sublime/test_biber_integration.py
            python3 Sublime/test_shuffle_integration.py
            python3 Sublime/test_synctex_integration.py
