name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run smoke tests in TeX Live container
        uses: xu-cheng/texlive-action@v2
        with:
          scheme: full
          # poppler-utils provides pdftotext for the content checks (substring
          # assertions + non-empty artifact checks). Visual regression is a
          # local-only aid (environment-specific reference images), so
          # ImageMagick is intentionally not installed here.
          run: |
            apk add --no-cache python3 poppler-utils
            python3 smoke_test.py -v

      - name: Upload failed-build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tex-logs
          path: |
            **/*.log
          retention-days: 7
