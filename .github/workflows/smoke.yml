name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run smoke tests in TeX Live container
        # Pinned (the commit v2 resolved to) so the build environment — and thus
        # the visual.yml reference rendering it shares — stays stable over time.
        uses: xu-cheng/texlive-action@f886de8159e5952a131848a5fa9c3196a2132b5d
        with:
          scheme: full
          # poppler-utils provides pdftotext for the content checks (substring
          # assertions + non-empty artifact checks). Visual regression is a
          # local-only aid (environment-specific reference images), so
          # ImageMagick is intentionally not installed here.
          run: |
            set -e
            apk add --no-cache python3 poppler-utils
            texlua Schedule/test_schedule_synctex.lua
            texlua Schedule/test_schedule_quiz_exam.lua
            python3 Sublime/test_texlib_builder.py
            python3 smoke_test.py -v

      - name: Upload failed-build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tex-logs
          path: |
            **/*.log
          retention-days: 7
